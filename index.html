<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Europe — UNESCO World Heritage</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400;1,600&family=Josefin+Sans:wght@300;400;600&family=IM+Fell+English:ital@0;1&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --ink:#16120e;--paper:#f7f3ec;--paper3:#e8e1d5;
  --gold:#b8842a;--gold-light:#d4a44e;
  --vis:#2a5c3f;--nat:#1a5c47;--muted:#8c8579;--muted2:#b5afa6;
  --line:rgba(22,18,14,0.08);--line2:rgba(22,18,14,0.05);
  --red:#8c3030;--shadow:0 2px 20px rgba(22,18,14,0.10);
  --de:#2a5c3f;--fr:#1a4a7a;--it:#7a2020;
  --se:#4a6b8a;--no:#7a4a1a;--cz:#5a2a6a;
  --es:#8a2a1a;--pt:#1a6a3a;--at:#6a3a1a;
  --be:#5a4a1a;--nl:#1a5a6a;--gr:#6a5a1a;
  --pl:#8a1a3a;--hu:#6a1a5a;--ro:#4a1a6a;
  --bg:#2a4a6a;--hr:#1a5a4a;--sk:#5a6a1a;
  --si:#1a4a5a;--dk:#8a2a4a;--fi:#3a6a5a;
  --ee:#5a3a6a;--lv:#6a2a4a;--lt:#4a6a2a;
  --lu:#6a5a2a;--ie:#2a6a4a;--mt:#8a5a1a;
  --cy:#5a2a6a;
}
html,body{height:100%;font-family:'Josefin Sans',sans-serif;background:var(--paper);color:var(--ink);overflow:hidden}
body::before{content:'';position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.035'/%3E%3C/svg%3E");pointer-events:none;z-index:9999;opacity:.4}
#app{display:grid;grid-template-columns:310px 1fr;grid-template-rows:56px 1fr;height:100vh}
header{grid-column:1/-1;display:flex;align-items:center;justify-content:space-between;padding:0 24px;border-bottom:1px solid var(--line);background:var(--paper);z-index:500;position:relative}
header::after{content:'';position:absolute;bottom:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--gold-light),transparent);opacity:.45}
.htitle{font-family:'Playfair Display',serif;font-weight:400;font-size:15.5px;display:flex;align-items:baseline;gap:7px}
.htitle .sep{color:var(--muted2);font-size:13px}
.htitle em{color:var(--gold);font-style:italic;font-family:'IM Fell English',serif}
.htitle .sub{font-family:'Josefin Sans',sans-serif;font-size:8px;letter-spacing:.18em;text-transform:uppercase;color:var(--muted);font-weight:300}
.hstats{display:flex;border:1px solid var(--line);border-radius:3px;overflow:hidden}
.hstat{padding:4px 14px;text-align:center;border-right:1px solid var(--line);font-size:7px;letter-spacing:.13em;text-transform:uppercase;color:var(--muted)}
.hstat:last-child{border-right:none}
.hstat b{display:block;font-family:'Playfair Display',serif;font-size:18px;font-weight:400;color:var(--ink);letter-spacing:0;line-height:1.1;margin-bottom:1px}
.hstat b.gold{color:var(--gold)}
#sidebar{background:var(--paper);border-right:1px solid var(--line);display:flex;flex-direction:column;overflow:hidden;z-index:400}
.ftab-row{display:flex;gap:3px;padding:9px 14px 8px;border-bottom:1px solid var(--line)}
.ftab{flex:1;padding:5px 3px;font-family:'Josefin Sans',sans-serif;font-size:7px;letter-spacing:.13em;text-transform:uppercase;font-weight:600;border:1px solid var(--line);border-radius:2px;background:transparent;cursor:pointer;color:var(--muted);transition:all .16s}
.ftab:hover{border-color:var(--gold-light);color:var(--ink)}
.ftab.on{background:var(--ink);color:var(--paper);border-color:var(--ink)}
.cfilter{display:grid;grid-template-columns:1fr 1fr 1fr;gap:3px;padding:8px 14px;border-bottom:1px solid var(--line)}
.cflag{padding:4px 3px;font-family:'Josefin Sans',sans-serif;font-size:7px;letter-spacing:.1em;text-transform:uppercase;font-weight:600;border:1px solid var(--line);border-radius:2px;background:transparent;cursor:pointer;color:var(--muted);transition:all .15s;display:flex;align-items:center;justify-content:center;gap:3px;white-space:nowrap}
.cflag:hover{color:var(--ink);border-color:var(--muted2)}
.cflag .flag{font-size:10px}
.cflag.on{color:#fff!important}
.cflag.on[data-c="DE"]{background:var(--de);border-color:var(--de)}
.cflag.on[data-c="FR"]{background:var(--fr);border-color:var(--fr)}
.cflag.on[data-c="IT"]{background:var(--it);border-color:var(--it)}
.cflag.on[data-c="SE"]{background:var(--se);border-color:var(--se)}
.cflag.on[data-c="NO"]{background:var(--no);border-color:var(--no)}
.cflag.on[data-c="CZ"]{background:var(--cz);border-color:var(--cz)}
.cflag.on[data-c="ES"]{background:var(--es);border-color:var(--es)}
.cflag.on[data-c="PT"]{background:var(--pt);border-color:var(--pt)}
.cflag.on[data-c="AT"]{background:var(--at);border-color:var(--at)}
.cflag.on[data-c="BE"]{background:var(--be);border-color:var(--be)}
.cflag.on[data-c="NL"]{background:var(--nl);border-color:var(--nl)}
.cflag.on[data-c="GR"]{background:var(--gr);border-color:var(--gr)}
.cflag.on[data-c="PL"]{background:var(--pl);border-color:var(--pl)}
.cflag.on[data-c="HU"]{background:var(--hu);border-color:var(--hu)}
.cflag.on[data-c="RO"]{background:var(--ro);border-color:var(--ro)}
.cflag.on[data-c="BG"]{background:var(--bg);border-color:var(--bg)}
.cflag.on[data-c="HR"]{background:var(--hr);border-color:var(--hr)}
.cflag.on[data-c="SK"]{background:var(--sk);border-color:var(--sk)}
.cflag.on[data-c="SI"]{background:var(--si);border-color:var(--si)}
.cflag.on[data-c="DK"]{background:var(--dk);border-color:var(--dk)}
.cflag.on[data-c="FI"]{background:var(--fi);border-color:var(--fi)}
.cflag.on[data-c="EE"]{background:var(--ee);border-color:var(--ee)}
.cflag.on[data-c="LV"]{background:var(--lv);border-color:var(--lv)}
.cflag.on[data-c="LT"]{background:var(--lt);border-color:var(--lt)}
.cflag.on[data-c="LU"]{background:var(--lu);border-color:var(--lu)}
.cflag.on[data-c="IE"]{background:var(--ie);border-color:var(--ie)}
.cflag.on[data-c="MT"]{background:var(--mt);border-color:var(--mt)}
.cflag.on[data-c="CY"]{background:var(--cy);border-color:var(--cy)}
.search-wrap{padding:7px 14px;border-bottom:1px solid var(--line);position:relative}
.srch{width:100%;padding:6px 10px 6px 27px;font-family:'Josefin Sans',sans-serif;font-size:9px;letter-spacing:.05em;background:var(--paper3);border:1px solid transparent;border-radius:2px;color:var(--ink);outline:none;transition:border-color .16s,background .16s}
.srch:focus{border-color:var(--gold-light);background:var(--paper)}
.srch::placeholder{color:var(--muted2)}
.search-icon{position:absolute;left:25px;top:50%;transform:translateY(-50%);width:11px;height:11px;color:var(--muted);pointer-events:none}
#list{overflow-y:auto;flex:1;padding:2px 0}
#list::-webkit-scrollbar{width:3px}
#list::-webkit-scrollbar-thumb{background:var(--paper3);border-radius:2px}
.sitem{display:flex;align-items:center;gap:8px;padding:6px 14px;cursor:pointer;border-left:2px solid transparent;transition:background .12s,border-color .15s}
.sitem:hover{background:rgba(22,18,14,.025)}
.sitem.active{background:linear-gradient(90deg,rgba(184,132,42,.07),transparent);border-left-color:var(--gold)}
.sitem.active .sname{color:var(--gold)}
.sdot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.sdot.unvisited{background:transparent;border:1.5px solid var(--muted2)}
.sdot.vis-DE{background:var(--de)}.sdot.vis-FR{background:var(--fr)}.sdot.vis-IT{background:var(--it)}
.sdot.vis-SE{background:var(--se)}.sdot.vis-NO{background:var(--no)}.sdot.vis-CZ{background:var(--cz)}
.sdot.vis-ES{background:var(--es)}.sdot.vis-PT{background:var(--pt)}.sdot.vis-AT{background:var(--at)}
.sdot.vis-BE{background:var(--be)}.sdot.vis-NL{background:var(--nl)}.sdot.vis-GR{background:var(--gr)}
.sdot.vis-PL{background:var(--pl)}.sdot.vis-HU{background:var(--hu)}.sdot.vis-RO{background:var(--ro)}
.sdot.vis-BG{background:var(--bg)}.sdot.vis-HR{background:var(--hr)}.sdot.vis-SK{background:var(--sk)}
.sdot.vis-SI{background:var(--si)}.sdot.vis-DK{background:var(--dk)}.sdot.vis-FI{background:var(--fi)}
.sdot.vis-EE{background:var(--ee)}.sdot.vis-LV{background:var(--lv)}.sdot.vis-LT{background:var(--lt)}
.sdot.vis-LU{background:var(--lu)}.sdot.vis-IE{background:var(--ie)}.sdot.vis-MT{background:var(--mt)}
.sdot.vis-CY{background:var(--cy)}
.sdot.vis-nat{background:var(--nat)}
.sinfo{flex:1;min-width:0}
.sname{font-family:'Playfair Display',serif;font-size:10.5px;line-height:1.35;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;transition:color .15s}
.smeta{font-size:6px;letter-spacing:.08em;color:var(--muted);text-transform:uppercase;margin-top:1px}
.ctag{font-size:5.5px;letter-spacing:.09em;text-transform:uppercase;padding:1.5px 4px;border-radius:2px;flex-shrink:0;font-weight:700;border:1px solid transparent}
.ctag-DE{background:rgba(42,92,63,.1);color:var(--de);border-color:rgba(42,92,63,.2)}
.ctag-FR{background:rgba(26,74,122,.1);color:var(--fr);border-color:rgba(26,74,122,.2)}
.ctag-IT{background:rgba(122,32,32,.1);color:var(--it);border-color:rgba(122,32,32,.2)}
.ctag-SE{background:rgba(74,107,138,.1);color:var(--se);border-color:rgba(74,107,138,.2)}
.ctag-NO{background:rgba(122,74,26,.1);color:var(--no);border-color:rgba(122,74,26,.2)}
.ctag-CZ{background:rgba(90,42,106,.1);color:var(--cz);border-color:rgba(90,42,106,.2)}
.ctag-ES{background:rgba(138,42,26,.1);color:var(--es);border-color:rgba(138,42,26,.2)}
.ctag-PT{background:rgba(26,106,58,.1);color:var(--pt);border-color:rgba(26,106,58,.2)}
.ctag-AT{background:rgba(106,58,26,.1);color:var(--at);border-color:rgba(106,58,26,.2)}
.ctag-BE{background:rgba(90,74,26,.1);color:var(--be);border-color:rgba(90,74,26,.2)}
.ctag-NL{background:rgba(26,90,106,.1);color:var(--nl);border-color:rgba(26,90,106,.2)}
.ctag-GR{background:rgba(106,90,26,.1);color:var(--gr);border-color:rgba(106,90,26,.2)}
.ctag-PL{background:rgba(138,26,58,.1);color:var(--pl);border-color:rgba(138,26,58,.2)}
.ctag-HU{background:rgba(106,26,90,.1);color:var(--hu);border-color:rgba(106,26,90,.2)}
.ctag-RO{background:rgba(74,26,106,.1);color:var(--ro);border-color:rgba(74,26,106,.2)}
.ctag-BG{background:rgba(42,74,106,.1);color:var(--bg);border-color:rgba(42,74,106,.2)}
.ctag-HR{background:rgba(26,90,74,.1);color:var(--hr);border-color:rgba(26,90,74,.2)}
.ctag-SK{background:rgba(90,106,26,.1);color:var(--sk);border-color:rgba(90,106,26,.2)}
.ctag-SI{background:rgba(26,74,90,.1);color:var(--si);border-color:rgba(26,74,90,.2)}
.ctag-DK{background:rgba(138,42,74,.1);color:var(--dk);border-color:rgba(138,42,74,.2)}
.ctag-FI{background:rgba(58,106,90,.1);color:var(--fi);border-color:rgba(58,106,90,.2)}
.ctag-EE{background:rgba(90,58,106,.1);color:var(--ee);border-color:rgba(90,58,106,.2)}
.ctag-LV{background:rgba(106,42,74,.1);color:var(--lv);border-color:rgba(106,42,74,.2)}
.ctag-LT{background:rgba(74,106,42,.1);color:var(--lt);border-color:rgba(74,106,42,.2)}
.ctag-LU{background:rgba(106,90,42,.1);color:var(--lu);border-color:rgba(106,90,42,.2)}
.ctag-IE{background:rgba(42,106,74,.1);color:var(--ie);border-color:rgba(42,106,74,.2)}
.ctag-MT{background:rgba(138,90,26,.1);color:var(--mt);border-color:rgba(138,90,26,.2)}
.ctag-CY{background:rgba(90,42,106,.1);color:var(--cy);border-color:rgba(90,42,106,.2)}
.tbtn{width:15px;height:15px;border-radius:50%;border:1px solid var(--line);background:var(--paper);cursor:pointer;flex-shrink:0;font-size:7px;display:flex;align-items:center;justify-content:center;color:var(--muted);transition:all .15s}
.tbtn:hover{transform:scale(1.15);border-color:var(--gold-light);color:var(--gold)}
.tbtn.marked{color:var(--red);border-color:rgba(140,48,48,.35)}
.sbfoot{padding:9px 14px;border-top:1px solid var(--line);flex-shrink:0;background:var(--paper3)}
.pflex{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:5px}
.plabel{font-size:6.5px;letter-spacing:.15em;text-transform:uppercase;color:var(--muted);font-weight:600}
.pval{font-family:'Playfair Display',serif;font-size:13px;color:var(--ink)}
.pval span{font-size:8px;color:var(--muted);font-family:'Josefin Sans',sans-serif;letter-spacing:.04em}
.ptrack{height:2px;background:var(--line);border-radius:2px;overflow:visible;position:relative}
.pfill{height:100%;background:linear-gradient(90deg,var(--vis),var(--gold));border-radius:2px;transition:width .5s cubic-bezier(.4,0,.2,1);position:relative}
.pfill::after{content:'';position:absolute;right:-3px;top:-3px;width:7px;height:7px;border-radius:50%;background:var(--gold);box-shadow:0 0 5px rgba(184,132,42,.55)}
.empty{padding:24px 14px;font-size:8.5px;color:var(--muted);text-align:center;letter-spacing:.08em;text-transform:uppercase}
#mapwrap{position:relative;overflow:hidden}
#map{width:100%;height:100%}
.leaflet-container{background:#ddd8cc!important;font-family:'Josefin Sans',sans-serif!important}
.leaflet-tile-pane{filter:sepia(18%) contrast(.97) brightness(.99) saturate(.85)}
.leaflet-popup-content-wrapper{background:var(--ink);color:var(--paper);border-radius:4px;box-shadow:0 12px 48px rgba(22,18,14,.5);padding:0;font-family:'Josefin Sans',sans-serif;border:none;overflow:hidden}
.leaflet-popup-content{margin:0!important;padding:0;width:300px!important}
.leaflet-popup-tip{background:var(--ink)!important}
.leaflet-popup-close-button{color:rgba(247,243,236,.55)!important;top:9px!important;right:11px!important;font-size:18px!important;z-index:10;text-shadow:0 1px 6px rgba(0,0,0,.7)}
.leaflet-popup-close-button:hover{color:#fff!important}
.pup-img-wrap{position:relative;width:100%;height:160px;overflow:hidden;background:#1a1710;flex-shrink:0}
.pup-img-wrap img{width:100%;height:100%;object-fit:cover;display:block;opacity:0;transition:opacity .5s ease}
.pup-img-wrap img.loaded{opacity:1}
.pup-img-overlay{position:absolute;bottom:0;left:0;right:0;height:65%;background:linear-gradient(to top,rgba(22,18,14,.95),transparent);pointer-events:none}
.pup-img-skeleton{position:absolute;inset:0;background:linear-gradient(90deg,#1a1710 25%,#252019 50%,#1a1710 75%);background-size:200% 100%;animation:shimmer 1.5s infinite}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
.pup-accent{height:2.5px}
.pup-body{padding:13px 14px 12px}
.pup-name{font-family:'Playfair Display',serif;font-size:13.5px;line-height:1.35;margin-bottom:3px;padding-right:16px;color:var(--paper);font-weight:400}
.pup-meta{font-size:6.5px;letter-spacing:.1em;text-transform:uppercase;color:rgba(247,243,236,.3);margin-bottom:10px}
.pup-desc{font-size:9px;line-height:1.68;color:rgba(247,243,236,.65);margin-bottom:12px;font-weight:300;letter-spacing:.02em;min-height:44px}
.pup-desc-loading{min-height:52px;display:flex;flex-direction:column;gap:5px;margin-bottom:12px}
.pup-desc-loading span{display:block;height:8px;border-radius:2px;background:linear-gradient(90deg,rgba(255,255,255,.07) 25%,rgba(255,255,255,.13) 50%,rgba(255,255,255,.07) 75%);background-size:200% 100%;animation:shimmer 1.5s infinite}
.pup-desc-loading span:nth-child(1){width:100%}
.pup-desc-loading span:nth-child(2){width:100%}
.pup-desc-loading span:nth-child(3){width:100%}
.pup-desc-loading span:nth-child(4){width:65%}
.pup-foot{display:flex;align-items:center;gap:7px}
.pup-status{display:inline-flex;align-items:center;gap:4px;font-size:6px;letter-spacing:.1em;text-transform:uppercase;padding:4px 8px;border-radius:2px;font-weight:600;flex-shrink:0}
.pup-status.v{background:rgba(42,92,63,.55);color:#a8d4b8}
.pup-status.u{background:rgba(247,243,236,.07);color:rgba(247,243,236,.38)}
.pup-btn{flex:1;padding:6px 8px;font-family:'Josefin Sans',sans-serif;font-size:7px;letter-spacing:.12em;text-transform:uppercase;font-weight:600;border:1px solid rgba(247,243,236,.16);background:transparent;color:var(--paper);cursor:pointer;border-radius:2px;transition:background .14s,border-color .14s;white-space:nowrap}
.pup-btn:hover{background:rgba(247,243,236,.08);border-color:rgba(247,243,236,.3)}
.pup-btn.vbtn{border-color:rgba(42,92,63,.5);color:#a8d4b8}
.pup-btn.vbtn:hover{background:rgba(42,92,63,.22)}
.leaflet-tooltip{background:var(--ink)!important;color:var(--paper)!important;border:none!important;font-family:'Josefin Sans',sans-serif!important;font-size:9px!important;letter-spacing:.07em!important;border-radius:2px!important;padding:4px 9px!important;box-shadow:0 2px 10px rgba(22,18,14,.22)!important;white-space:nowrap!important}
.leaflet-tooltip-top::before{border-top-color:var(--ink)!important}
#legend{position:absolute;bottom:20px;right:16px;z-index:1000;background:rgba(247,243,236,.96);border:1px solid rgba(22,18,14,.07);border-radius:3px;padding:9px 12px;box-shadow:var(--shadow)}
.leg-title{font-size:6px;letter-spacing:.18em;text-transform:uppercase;color:var(--muted);margin-bottom:7px;font-weight:600}
.li{display:flex;align-items:center;gap:7px;margin-bottom:4px;font-size:7px;letter-spacing:.07em;color:var(--muted);text-transform:uppercase}
.li:last-of-type{margin-bottom:0}
.ldot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.leg-div{margin:5px 0;border-top:1px solid var(--line2)}
.leg-tip{margin-top:5px;padding-top:5px;border-top:1px solid var(--line);font-size:6px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted2)}
@keyframes fadeUp{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
.sitem{animation:fadeUp .14s ease both}

/* ── Auth Modal ──────────────────────────────────────────────────────────── */
#auth-overlay{position:fixed;inset:0;background:rgba(22,18,14,.72);z-index:9000;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(3px)}
#auth-overlay.hidden{display:none}
#auth-box{background:var(--paper);border:1px solid var(--line);border-radius:6px;padding:32px 36px;width:340px;box-shadow:0 24px 64px rgba(22,18,14,.35)}
.auth-title{font-family:'Playfair Display',serif;font-size:20px;font-weight:400;margin-bottom:4px;color:var(--ink)}
.auth-sub{font-size:8px;letter-spacing:.15em;text-transform:uppercase;color:var(--muted);margin-bottom:24px}
.auth-label{font-size:8px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);font-weight:600;display:block;margin-bottom:5px}
.auth-input{width:100%;padding:9px 12px;font-family:'Josefin Sans',sans-serif;font-size:12px;background:var(--paper3);border:1px solid var(--line);border-radius:3px;color:var(--ink);outline:none;margin-bottom:14px;transition:border-color .15s}
.auth-input:focus{border-color:var(--gold-light);background:var(--paper)}
.auth-btn{width:100%;padding:10px;font-family:'Josefin Sans',sans-serif;font-size:8px;letter-spacing:.15em;text-transform:uppercase;font-weight:600;background:var(--ink);color:var(--paper);border:none;border-radius:3px;cursor:pointer;margin-bottom:10px;transition:background .15s}
.auth-btn:hover{background:#2a2218}
.auth-btn:disabled{opacity:.5;cursor:not-allowed}
.auth-toggle{font-size:8px;letter-spacing:.08em;color:var(--muted);text-align:center;cursor:pointer}
.auth-toggle span{color:var(--gold);text-decoration:underline;cursor:pointer}
.auth-err{font-size:8px;color:var(--red);margin-bottom:10px;min-height:14px;letter-spacing:.04em}
.auth-divider{border:none;border-top:1px solid var(--line);margin:14px 0}
/* ── User pill in header ─────────────────────────────────────────────────── */
#user-pill{display:flex;align-items:center;gap:8px;font-size:8px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted)}

#login-btn:hover{border-color:var(--gold-light);color:var(--ink)}
#logout-btn{font-family:'Josefin Sans',sans-serif;font-size:7px;letter-spacing:.13em;text-transform:uppercase;font-weight:600;padding:5px 12px;border:1px solid var(--line);border-radius:2px;background:transparent;cursor:pointer;color:var(--muted);transition:all .15s}
#logout-btn:hover{border-color:var(--red);color:var(--red)}
#user-email{font-family:'Josefin Sans',sans-serif;font-size:7.5px;color:var(--muted);max-width:160px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.sync-dot{width:5px;height:5px;border-radius:50%;background:var(--nat);display:inline-block;margin-right:3px}

// ── Icon factory ──────────────────────────────────────────────────────────────
function makeIcon(site,isFocused){
  const isV=visited.has(site.id);
  const r=isFocused?9:6,total=r*2+8,cx=total/2,cy=total/2;
  const cc=COUNTRY_COLORS[site.country];
  const fill=isV?(site.type==='natural'?'#1a5c47':cc.fill):'#f7f3ec';
  const stroke=isV?(site.type==='natural'?'#0d3028':cc.stroke):'#8c8579';
  const shine=isV?`<circle cx="${cx-r*.22}" cy="${cy-r*.22}" r="${r*.28}" fill="rgba(255,255,255,0.28)"/>`:'';
  const ring=isFocused?`<circle cx="${cx}" cy="${cy}" r="${r+2.5}" fill="none" stroke="#b8842a" stroke-width="1.8" opacity="0.75"/>`:'';
  return L.divIcon({
    className:'',iconSize:[total,total],iconAnchor:[cx,cy],popupAnchor:[0,-(r+6)],
    html:`<svg width="${total}" height="${total}" viewBox="0 0 ${total} ${total}" xmlns="http://www.w3.org/2000/svg">
      <defs><filter id="sh${r}${isV?1:0}${site.country}"><feDropShadow dx="0" dy="1" stdDeviation="${isFocused?2.5:1.2}" flood-color="rgba(0,0,0,${isFocused?.28:.16})"/></filter></defs>
      ${ring}<circle cx="${cx}" cy="${cy}" r="${r}" fill="${fill}" stroke="${stroke}" stroke-width="1.4" filter="url(#sh${r}${isV?1:0}${site.country})"/>${shine}
    </svg>`
  });
}

// ── AI enrichment cache ───────────────────────────────────────────────────────
const enrichCache = {};

async function fetchEnrichment(site) {
  if (enrichCache[site.id]) return enrichCache[site.id];

  // Fetch description from Claude and image from Wikimedia simultaneously
  const [claudeRes, imgUrl] = await Promise.all([
    fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({
        model: "claude-sonnet-4-20250514",
        max_tokens: 1000,
        messages: [{
          role: "user",
          content: `Write a vivid, engaging 2-3 sentence description of the UNESCO World Heritage Site "${site.name}" in ${COUNTRY_NAMES[site.country]} (inscribed ${site.year}). Explain what makes it extraordinary and why it deserved UNESCO recognition. Be evocative and specific — mention striking visual details, historical significance, or unique qualities. Do not start with the site name. Plain text only, no markdown.`
        }]
      })
    }).then(r => r.json()).then(d => d.content?.[0]?.text || "").catch(() => ""),

    fetchWikimediaImage(site)
  ]);

  const result = { desc: claudeRes, imgUrl };
  enrichCache[site.id] = result;
  return result;
}

async function fetchWikimediaImage(site) {
  // Build a search query tailored to the site
  const query = `${site.name} ${COUNTRY_NAMES[site.country]}`;
  try {
    const searchUrl = `https://en.wikipedia.org/w/api.php?action=query&titles=${encodeURIComponent(site.name)}&prop=pageimages&piprop=original&pithumbsize=600&format=json&origin=*`;
    const r = await fetch(searchUrl);
    const d = await r.json();
    const pages = d.query?.pages || {};
    const page = Object.values(pages)[0];
    if (page?.original?.source) return page.original.source;
    if (page?.thumbnail?.source) return page.thumbnail.source;
    // Fallback: search for the page first
    const s2 = await fetch(`https://en.wikipedia.org/w/api.php?action=query&list=search&srsearch=${encodeURIComponent(query)}&srlimit=1&prop=pageimages&format=json&origin=*`);
    const d2 = await s2.json();
    const title = d2.query?.search?.[0]?.title;
    if (!title) return null;
    const s3 = await fetch(`https://en.wikipedia.org/w/api.php?action=query&titles=${encodeURIComponent(title)}&prop=pageimages&piprop=original&pithumbsize=600&format=json&origin=*`);
    const d3 = await s3.json();
    const pages3 = d3.query?.pages || {};
    const page3 = Object.values(pages3)[0];
    return page3?.original?.source || page3?.thumbnail?.source || null;
  } catch(e) { return null; }
}

function popupContent(site) {
  const v = visited.has(site.id);
  const skelRows = `<div class="pup-desc-loading"><span></span><span></span><span></span><span></span></div>`;
  return `
    <div class="pup-img-wrap" id="pup-img-${site.id}">
      <div class="pup-img-skeleton" id="pup-skel-${site.id}"></div>
    </div>
    <div class="pup-accent" style="background:${ACCENT[site.country]}"></div>
    <div class="pup-body">
      <div class="pup-name">${site.name}</div>
      <div class="pup-meta">UNESCO ${site.year} · ${site.type} · ${COUNTRY_NAMES[site.country]}</div>
      <div id="pup-desc-${site.id}">${skelRows}</div>
      <div class="pup-foot">
        <span class="pup-status ${v?'v':'u'}" id="pup-status-${site.id}">${v?'✓ Visited':'○ Not visited'}</span>
        <button class="pup-btn${v?' vbtn':''}" id="pup-btn-${site.id}" onclick="toggleV(${site.id})">${v?'Mark unvisited':'Mark visited'}</button>
      </div>
    </div>`;
}

function updatePopupVisitedState(id) {
  const v = visited.has(id);
  const statusEl = document.getElementById(`pup-status-${id}`);
  const btnEl = document.getElementById(`pup-btn-${id}`);
  if (statusEl) {
    statusEl.className = `pup-status ${v?'v':'u'}`;
    statusEl.textContent = v ? '✓ Visited' : '○ Not visited';
  }
  if (btnEl) {
    btnEl.className = `pup-btn${v?' vbtn':''}`;
    btnEl.textContent = v ? 'Mark unvisited' : 'Mark visited';
  }
}

async function enrichPopup(site) {
  const { desc, imgUrl } = await fetchEnrichment(site);

  // Inject description
  const descEl = document.getElementById(`pup-desc-${site.id}`);
  if (descEl) descEl.innerHTML = `<div class="pup-desc">${desc || 'An outstanding site of universal cultural and natural significance.'}</div>`;

  // Inject image
  const imgWrap = document.getElementById(`pup-img-${site.id}`);
  if (imgWrap && imgUrl) {
    const skelEl = document.getElementById(`pup-skel-${site.id}`);
    const img = document.createElement('img');
    img.onload = () => {
      img.classList.add('loaded');
      if (skelEl) skelEl.style.display = 'none';
      // Force Leaflet to update popup position
      setTimeout(() => { try { Object.values(markers).find(m=>m.isPopupOpen())?.update(); } catch(e){} }, 50);
    };
    img.onerror = () => {
      if (skelEl) skelEl.style.display = 'none';
      imgWrap.style.height = '0';
    };
    img.src = imgUrl;
    img.alt = site.name;
    imgWrap.appendChild(img);
    const overlay = document.createElement('div');
    overlay.className = 'pup-img-overlay';
    imgWrap.appendChild(overlay);
  } else if (imgWrap) {
    const skelEl = document.getElementById(`pup-skel-${site.id}`);
    if (skelEl) skelEl.style.display = 'none';
    imgWrap.style.height = '0';
  }
}

// Place markers — skip overseas territories outside map bounds
SITES.forEach(s=>{
  if(s.lat<34||s.lat>72||s.lng<-28||s.lng>45)return;
  const m=L.marker([s.lat,s.lng],{icon:makeIcon(s,false),title:s.name,zIndexOffset:visited.has(s.id)?100:0});
  m.bindTooltip(s.name,{direction:'top',offset:[0,-4],opacity:1});
  m.bindPopup(()=>popupContent(s),{maxWidth:320,minWidth:300});
  m.on('popupopen',()=>{setFocus(s.id,false);enrichPopup(s);});
  markers[s.id]=m;
  m.addTo(map);
});

function toggleV(id){
  visited.has(id)?visited.delete(id):visited.add(id);
  try{localStorage.setItem('eu_v4',JSON.stringify([...visited]))}catch(e){}
  if(_user) saveVisitedToCloud();
  const s=SITES.find(x=>x.id===id),m=markers[id];
  if(m){m.setIcon(makeIcon(s,focusedId===id));m.setZIndexOffset(visited.has(id)?100:0);}
  updatePopupVisitedState(id);
  renderList();updateStats();
}
window.toggleV=toggleV;

function setFocus(id,fly){
  const prev=focusedId;focusedId=id;
  if(prev&&prev!==id&&markers[prev]){const ps=SITES.find(s=>s.id===prev);if(ps)markers[prev].setIcon(makeIcon(ps,false))}
  const s=SITES.find(x=>x.id===id);if(!s)return;
  if(markers[id])markers[id].setIcon(makeIcon(s,true));
  if(fly)map.flyTo([s.lat,s.lng],Math.max(map.getZoom(),11),{duration:1.1});
  renderList();
  setTimeout(()=>document.querySelector(`[data-id="${id}"]`)?.scrollIntoView({behavior:'smooth',block:'nearest'}),60);
}
window.flyTo=function(id){setFocus(id,true);if(markers[id])setTimeout(()=>markers[id].openPopup(),1200)};

document.querySelectorAll('.cflag').forEach(btn=>{
  btn.addEventListener('click',()=>{
    const c=btn.dataset.c;

      document.querySelectorAll('.cflag').forEach(b=>b.classList.remove('on'));
      SITES.forEach(s=>markers[s.id]&&markers[s.id].setOpacity(1));
      map.flyTo([54.0,12.0],4,{duration:1.1});
    } else {
      activeCountry=c;
      document.querySelectorAll('.cflag').forEach(b=>b.classList.remove('on'));
      btn.classList.add('on');
      SITES.forEach(s=>markers[s.id]&&markers[s.id].setOpacity(s.country===c?1:0.15));
      const v=COUNTRY_VIEWS[c];map.flyTo([v[0],v[1]],v[2],{duration:1.1});
    }
    renderList();updateStats();
  });
});

function renderList(){
  const q=searchQ.toLowerCase();
  const visIds=new Set(Object.keys(markers).map(Number));
  const items=SITES.filter(s=>{
    if(!visIds.has(s.id))return false;
    if(filter==='visited'&&!visited.has(s.id))return false;
    if(filter==='unvisited'&&visited.has(s.id))return false;
    if(activeCountry&&s.country!==activeCountry)return false;
    if(q&&!s.name.toLowerCase().includes(q))return false;
    return true;
  }).sort((a,b)=>a.country.localeCompare(b.country)||a.name.localeCompare(b.name));

  if(!items.length){document.getElementById('list').innerHTML=`<div class="empty">No sites found</div>`;return}
  document.getElementById('list').innerHTML=items.map((s,i)=>{
    const v=visited.has(s.id),f=focusedId===s.id;
    const dc=v?(s.type==='natural'?'vis-nat':`vis-${s.country}`):'unvisited';
    return `<div class="sitem${f?' active':''}" data-id="${s.id}" onclick="flyTo(${s.id})" style="animation-delay:${Math.min(i*.015,.3)}s">
      <div class="sdot ${dc}"></div>
      <div class="sinfo"><div class="sname">${s.name}</div><div class="smeta">${s.year}</div></div>
      <span class="ctag ctag-${s.country}">${s.country}</span>
      <button class="tbtn${v?' marked':''}" onclick="event.stopPropagation();toggleV(${s.id})">${v?'✕':'✓'}</button>
    </div>`;
  }).join('');
}

function updateStats(){
  const visIds=new Set(Object.keys(markers).map(Number));
  const pool=SITES.filter(s=>visIds.has(s.id)&&(!activeCountry||s.country===activeCountry));
  const v=pool.filter(s=>visited.has(s.id)).length,t=pool.length;
  document.getElementById('sv').textContent=v;
  document.getElementById('sr').textContent=t-v;
  document.getElementById('st').textContent=t;
  document.getElementById('sv2').textContent=v;
  document.getElementById('st2').textContent=t;
  document.getElementById('pfill').style.width=t?`${(v/t)*100}%`:'0%';
}

document.querySelectorAll('.ftab').forEach(tab=>{
  tab.addEventListener('click',()=>{
    document.querySelectorAll('.ftab').forEach(t=>t.classList.remove('on'));
    tab.classList.add('on');filter=tab.dataset.f;renderList();updateStats();
  });
});
document.getElementById('srch').addEventListener('input',e=>{searchQ=e.target.value;renderList()});
renderList();updateStats();
